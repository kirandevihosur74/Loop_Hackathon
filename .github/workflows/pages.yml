name: Deploy Powerfly PWA to GitHub Pages

# Uploads the prebuilt static site in Frontend/dev/pages-dist (built with
# GITHUB_PAGES=true so it carries the /Loop_Hackathon basePath) and deploys it
# to GitHub Pages. enablement:true turns Pages on without touching repo settings.

on:
  push:
    branches: [main]
    paths:
      - "Frontend/dev/pages-dist/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./Frontend/dev/pages-dist
      - id: deployment
        uses: actions/deploy-pages@v4
